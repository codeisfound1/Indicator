<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid Finder</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>Grid Finder</h1>
      <div id="lobby-controls">
        <button id="btn-new-room">Create Room</button>
        <select id="level-select">
          <option value="easy">Easy 5x5</option>
          <option value="medium">Medium 7x7</option>
          <option value="hard">Hard 10x10</option>
          <option value="custom">Custom</option>
        </select>
        <input id="custom-n" type="number" min="10" max="30" value="10" style="width:70px; display:none" />
      </div>
    </header>

    <main id="main">
      <section id="lobby">
        <h2>Lobby</h2>
        <div id="rooms"></div>
      </section>

      <section id="room-panel" class="hidden">
        <div id="room-header">
          <div id="room-info"></div>
          <div id="room-actions">
            <button id="btn-start" class="hidden">Start Game</button>
            <button id="btn-leave">Leave</button>
          </div>
        </div>

        <div id="room-body">
          <aside id="sidebar">
            <div id="players-list"></div>
            <div id="chat">
              <div id="chat-messages"></div>
              <form id="chat-form">
                <input id="chat-input" autocomplete="off" placeholder="Message..." />
                <button type="submit">Send</button>
              </form>
            </div>
            <div id="settings">
              <label><input type="checkbox" id="high-contrast" /> High Contrast</label>
            </div>
          </aside>

          <section id="game-area">
            <div id="hud">
              <div id="target-number">1</div>
              <div id="timer">10:00</div>
              <div id="best-times"></div>
            </div>
            <div id="grids-container"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
