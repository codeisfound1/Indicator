<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grid Sequence Game</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Grid Sequence Game</h1>
      <div class="top-controls">
        <input id="playerName" placeholder="Your name" />
        <button id="createRoomBtn">Create Room</button>
        <select id="createLevel">
          <option value="easy">Easy 5x5</option>
          <option value="medium">Medium 7x7</option>
          <option value="hard">Hard 10x10</option>
          <option value="custom">Custom n x n</option>
        </select>
        <input id="customN" type="number" min="10" placeholder="n (>=10)" style="width:90px;" />
      </div>
    </header>

    <main>
      <section id="lobby">
        <h2>Lobby</h2>
        <div id="roomsList"></div>
      </section>

      <section id="room" class="hidden">
        <div class="room-header">
          <h2 id="roomTitle"></h2>
          <div>
            <button id="leaveBtn">Leave Room</button>
            <button id="startBtn">Start Game (Host)</button>
          </div>
        </div>

        <div class="room-body">
          <aside class="sidebar">
            <div>
              <strong>Players</strong>
              <ul id="playersList"></ul>
            </div>
            <div>
              <strong>Chat</strong>
              <div id="chatBox" class="chatbox"></div>
              <input id="chatInput" placeholder="Type message..." />
            </div>
            <div>
              <strong>Room Level</strong>
              <select id="roomLevelSelect">
                <option value="easy">Easy 5x5</option>
                <option value="medium">Medium 7x7</option>
                <option value="hard">Hard 10x10</option>
                <option value="custom">Custom</option>
              </select>
            </div>
          </aside>

          <section class="game-area">
            <div class="game-top">
              <div class="target-and-timer">
                <div id="targetDisplay" class="target">--</div>
                <div class="timer">
                  <div>Time: <span id="timeLeft">00:00</span></div>
                  <div>Best: <span id="bestTime">--:--</span></div>
                </div>
              </div>
              <div class="grid-controls">
                <label>Cell size: <input id="cellSize" type="range" min="30" max="120" value="60"></label>
                <label>Font size: <input id="fontSize" type="range" min="12" max="80" value="25"></label>
              </div>
            </div>

            <div id="gridContainer" class="grid-container"></div>

            <div class="game-footer">
              <div id="statusLine">Waiting to start...</div>
              <div id="finishTimes"></div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
