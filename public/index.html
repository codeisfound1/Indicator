<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grid Generator Game</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <div id="lobby">
      <input id="playerName" placeholder="Tên bạn" />
      <select id="levelSelect">
        <option value="easy">Dễ (5x5)</option>
        <option value="medium">Trung bình (7x7)</option>
        <option value="hard">Khó (10x10)</option>
        <option value="super">Siêu khó (nxn)</option>
      </select>
      <input id="customN" placeholder="n (>=10)" style="display:none;width:80px" />
      <button id="createBtn">Tạo Room</button>
      <input id="joinRoomId" placeholder="Mã room" />
      <button id="joinBtn">Tham gia Room</button>
      <div id="roomsInfo"></div>
    </div>

    <div id="gameArea" style="display:none">
      <div id="topBar">
        <div id="roomInfo"></div>
        <div id="timer">Time: <span id="timeLeft">600</span>s</div>
        <div id="target">Find: <span id="targetNumber" style="font-size:65px"></span></div>
        <div id="localStats">Elapsed: <span id="elapsed">0</span>s | Best: <span id="best">--</span>s</div>
      </div>

      <div id="gridsContainer"></div>

      <div id="controls">
        <button id="startGameBtn">Bắt đầu</button>
        <button id="leaveBtn">Rời Room</button>
      </div>

      <div id="chatArea">
        <div id="chatHeader"></div>
        <div id="chatLog"></div>
      </div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
