<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grid Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby" class="panel">
    <h1>Grid Finder</h1>
    <div class="row">
      <input id="playerName" placeholder="Your name" />
      <select id="levelSelect">
        <option value="easy">Dễ 5x5</option>
        <option value="medium">Trung bình 7x7</option>
        <option value="hard">Khó 10x10</option>
        <option value="custom">Siêu khó (tùy n)</option>
      </select>
      <input id="customN" type="number" min="10" value="10" style="width:80px;display:none"/>
      <button id="createRoomBtn">Create Room</button>
      <input id="roomIdInput" placeholder="Room ID to join" />
      <button id="joinRoomBtn">Join Room</button>
    </div>
    <div id="roomsList"></div>
  </div>

  <div id="game" class="panel" style="display:none">
    <div class="topbar">
      <div><strong>Room:</strong> <span id="roomIdDisplay"></span></div>
      <div><strong>Player:</strong> <span id="playerDisplay"></span></div>
      <div><strong>Target:</strong> <span id="currentTarget" class="bigTarget"></span></div>
      <div><strong>Timer:</strong> <span id="timerDisplay">600</span>s</div>
      <div><button id="leaveBtn">Leave</button></div>
    </div>

    <div id="multigridWrap"></div>

    <div class="controls">
      <label>Cell size: <input id="cellSize" type="range" min="30" max="120" value="60" /></label>
      <label>Cell font: <input id="cellFontSize" type="range" min="12" max="48" value="25" /></label>
      <button id="startBtn">Start Game</button>
    </div>

    <div id="statusLog" class="panel small"></div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
