<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid Generator Game</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <div id="lobby" class="panel">
      <h2>Lobby</h2>
      <div>
        <button id="createEasy">Create Easy</button>
        <button id="createMedium">Create Medium</button>
        <button id="createHard">Create Hard</button>
        <button id="createSuper">Create Super</button>
      </div>
      <div>
        <input id="superN" type="number" placeholder="n for super (>=10)" min="10" />
        <input id="countdown" type="number" placeholder="Countdown (s)" />
      </div>
      <h3>Rooms</h3>
      <ul id="rooms"></ul>
      <h3>Your name: <span id="playerName"></span></h3>
      <input id="nameInput" placeholder="Change name" />
    </div>

    <div id="room" class="panel hidden">
      <div class="topbar">
        <div><strong>Room:</strong> <span id="roomName"></span> — <span id="roomState"></span></div>
        <div><button id="leaveRoom">Leave</button> <button id="startGame">Start</button></div>
      </div>

      <div class="room-main">
        <div id="playersList" class="sidebar">
          <h4>Players</h4>
          <ul id="players"></ul>
          <h4>Best Times</h4>
          <ul id="bestTimes"></ul>
          <h4>Chat</h4>
          <div id="chatBox" class="chatbox"></div>
          <input id="chatInput" placeholder="Say something" />
        </div>

        <div id="gameArea" class="gamearea">
          <div class="game-header">
            <div>Time left: <span id="timeLeft"></span></div>
            <div>Find: <span id="targetNumber" style="font-size:65px;font-weight:700"></span></div>
            <div>Level: <span id="levelLabel"></span></div>
          </div>
          <div id="gridsContainer" class="grids"></div>
          <div id="results" class="hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
