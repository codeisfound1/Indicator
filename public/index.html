
<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grid Generator SVG - Multiplayer</title>
<style>
  :root{--gap:8px;--control-height:64px;--default-cell-size:60;--ui-font:"Helvetica Neue",Arial,sans-serif}
  body{font-family:var(--ui-font);margin:0;padding:12px;background:#f4f6f8;color:#111}
  .topbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  label{font-size:14px}
  select,input[type=number]{padding:6px;border-radius:6px;border:1px solid #ccc}
  button{padding:8px 12px;border-radius:6px;border:1px solid #888;background:#fff;cursor:pointer}
  button.primary{background:#007bff;color:#fff;border-color:#007bff}
  .players-area{display:grid;gap:12px;width:100%}
  .player-card{background:#fff;border-radius:8px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08);display:flex;flex-direction:column;align-items:stretch}
  .player-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .player-head .meta{display:flex;gap:8px;align-items:center}
  .target-number{font-weight:700}
  .timer{font-size:14px}
  .svg-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:6px}
  .grid-svg{background:transparent;display:block}
  .footer-stats{display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .small{font-size:13px;color:#444}
  @media (min-width:1200px){
    .players-area.columns-1{grid-template-columns:1fr}
    .players-area.columns-2{grid-template-columns:1fr 1fr}
    .players-area.columns-3{grid-template-columns:1fr 1fr 1fr}
    .players-area.columns-4{grid-template-columns:1fr 1fr}
  }
  @media (max-width:1199px){
    .players-area.columns-1{grid-template-columns:1fr}
    .players-area.columns-2{grid-template-columns:1fr 1fr}
    .players-area.columns-3{grid-template-columns:1fr 1fr}
    .players-area.columns-4{grid-template-columns:1fr 1fr}
  }
  @media (max-width:600px){
    .players-area.columns-2,.players-area.columns-4,.players-area.columns-3{grid-template-columns:1fr}
  }
  .size-control{width:84px}
  .best-badge{background:#fffae6;padding:4px 8px;border-radius:6px;font-size:13px}
  .room-id{font-weight:700;color:#333}
</style>
</head>
<body>

<div class="topbar">
  <div class="controls">
    <label>Level:
      <select id="levelSelect">
        <option value="easy">Dễ (5x5)</option>
        <option value="medium">Trung bình (7x7)</option>
        <option value="hard">Khó (10x10)</option>
        <option value="custom">Siêu khó (nxn)</option>
      </select>
    </label>

    <label id="customNLabel" style="display:none">n:
      <input id="customN" type="number" min="10" value="12" class="size-control"/>
    </label>

    <label>Số người:
      <select id="playersCount">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
      </select>
    </label>

    <label>Cell size (px):
      <input id="cellSize" type="number" value="60" min="24" max="140" class="size-control"/>
    </label>

    <label>Font-size (cells):
      <input id="cellFontSize" type="number" value="25" min="8" max="72" class="size-control"/>
    </label>

    <label>Target font-size:
      <input id="targetFont" type="number" value="65" min="18" max="140" class="size-control"/>
    </label>

    <label>Countdown (s):
      <input id="countdownInput" type="number" value="600" min="10" class="size-control"/>
    </label>

    <button id="createRoomBtn" class="primary">Tạo phòng & bắt đầu</button>
    <button id="joinRoomBtn">Tham gia phòng</button>
    <input id="joinRoomInput" placeholder="Room ID" style="padding:6px;border-radius:6px;border:1px solid #ccc;width:120px"/>
    <button id="localStartBtn">Chơi cục bộ</button>
  </div>
</div>

<div style="margin-bottom:10px">
  Room: <span id="roomIdDisplay" class="room-id">—</span>
</div>

<div class="players-area columns-4" id="playersArea"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* Helper funcs */
const randInt = (min,max)=> Math.floor(Math.random()*(max-min+1))+min;
const shuffle = (arr)=>{ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]] } return arr }
function hslToHex(h,s,l){ s/=100; l/=100; const k=(n)=> (n + h/30) % 12; const a=s * Math.min(l,1-l); const f=(n)=> { const color = l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n),1))); return Math.round(255*color).toString(16).padStart(2,'0'); }; return `#${f(0)}${f(8)}${f(4)}`; }
function randomColor(excludeHex){ for(let i=0;i<30;i++){ const h=randInt(0,360); const s=randInt(55,85); const l=randInt(35,75); const hex=hslToHex(h,s,l); if(!excludeHex || hex.toLowerCase()!==excludeHex.toLowerCase()) return {hex,h,s,l}; } return {hex:'#cccccc'} }
function formatTime(sec){ const m=Math.floor(sec/60); const s=sec%60; return `${m}:${String(s).padStart(2,'0')}` }

/* State */
const state = { players:1, grids:[], running:false, roomId:null, myIndex:null, socketConnected:false, localMode:false };

/* DOM refs */
const playersArea = document.getElementById('playersArea');
const levelSelect = document.getElementById('levelSelect');
const customNLabel = document.getElementById('customNLabel');
const customN = document.getElementById('customN');
const playersCount = document.getElementById('playersCount');
const cellSizeInput = document.getElementById('cellSize');
const cellFontInput = document.getElementById('cellFontSize');
const targetFontInput = document.getElementById('targetFont');
const countdownInput = document.getElementById('countdownInput');
const createRoomBtn = document.getElementById('createRoomBtn');
const joinRoomBtn = document.getElementById('joinRoomBtn');
const joinRoomInput = document.getElementById('joinRoomInput');
const roomIdDisplay = document.getElementById('roomIdDisplay');
const localStartBtn = document.getElementById('localStartBtn');

levelSelect.addEventListener('change', ()=> customNLabel.style.display = levelSelect.value==='custom' ? 'inline-block':'none');
playersCount.addEventListener('change', ()=> renderPlayersAreaLayout());
createRoomBtn.addEventListener('click', createRoomAndStart);
joinRoomBtn.addEventListener('click', ()=> joinRoom(joinRoomInput.value.trim()));
localStartBtn.addEventListener('click', ()=> { state.localMode=true; startLocalGame(); });

/* socket */
const socket = io();
socket.on('connect', ()=> { state.socketConnected=true; console.log('socket connected'); });
socket.on('disconnect', ()=> { state.socketConnected=false; console.log('socket disconnected'); });

socket.on('roomCreated', ({roomId, playerIndex})=>{
  state.roomId = roomId; state.myIndex = playerIndex;
  roomIdDisplay.textContent = roomId;
  alert('Đã tạo phòng: ' + roomId);
});

socket.on('joined', ({roomId, playerIndex})=>{
  state.roomId = roomId; state.myIndex = playerIndex;
  roomIdDisplay.textContent = roomId;
  alert('Đã vào phòng: ' + roomId + ' (Bạn là player ' + (playerIndex+1) + ')');
});

socket.on('playerList', ({count})=>{
  // adjust UI number of player cards to count
  playersCount.value = count;
  renderPlayersAreaLayout();
});

socket.on('initGrid', ({playerIndex, n, numbers, total, countdown, config})=>{
  // build grid from server-assigned numbers for this client
  state.localMode = false;
  renderPlayersAreaLayout(); // ensure players area present
  buildGridFromServer(playerIndex, n, numbers, total, countdown, config);
});

socket.on('cellCorrect', ({playerIndex, val, found, target})=>{
  markCellAsFound(playerIndex, val);
  // update counters
  const g = state.grids[playerIndex];
  if(g){
    g.found = found; g.target = target; g.remaining = g.total - found;
    updatePlayerUI(playerIndex);
  }
});

socket.on('cellWrong', ({val})=>{
  flashWrongLocal(val);
});

socket.on('tick', ({globalRemaining, players})=>{
  // update global countdown somewhere (we'll set each player's time from players array)
  players.forEach(p=>{
    const g = state.grids[p.index];
    if(g){
      g.time = p.time;
      g.found = p.found;
      g.target = p.target;
      updatePlayerUI(p.index);
    }
  });
});

socket.on('playerFinished', ({index, time, best})=>{
  const g = state.grids[index];
  if(g){
    g.found = g.total; g.target = g.total+1; g.time = time; g.best = best;
    updatePlayerUI(index);
    markPlayerDone(index);
  }
});

socket.on('gameEnded', ({reason})=>{
  state.running = false;
  alert('Trò chơi kết thúc: ' + reason);
});

/* Render player area layout */
function renderPlayersAreaLayout(){
  const p = parseInt(playersCount.value,10);
  playersArea.className = `players-area columns-${p}`;
  playersArea.innerHTML = '';
  state.players = p;
  state.grids = [];
  for(let i=0;i<p;i++){
    const card = document.createElement('div'); card.className='player-card'; card.dataset.player=i;
    card.innerHTML = `
      <div class="player-head">
        <div class="meta"><strong>Player ${i+1}</strong></div>
        <div class="meta">
          <div class="timer small">Time: <span class="time-el">0:00</span></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div class="small">Số cần tìm: <span class="target-number" style="font-size:36px">-</span></div>
        <div class="small best-badge">Best: <span class="best-time">--</span></div>
      </div>
      <div class="svg-wrap"><svg class="grid-svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
      <div class="footer-stats small">
        <div class="progress">Found: <span class="found-count">0</span></div>
        <div class="remaining">Remain: <span class="remain-count">0</span></div>
      </div>
    `;
    playersArea.appendChild(card);
    state.grids.push({card, n:0, cells:[], svg:null, target:1, found:0, remaining:0, time:0, total:0, best:null});
  }
}

/* Build grid for local-only mode using internal shuffle */
function buildGridForLocal(playerIndex){
  const g = state.grids[playerIndex];
  const cellSize = parseInt(cellSizeInput.value,10) || 60;
  const cellFont = parseInt(cellFontInput.value,10) || 25;
  let n;
  const level = levelSelect.value;
  if(level==='easy') n=5;
  else if(level==='medium') n=7;
  else if(level==='hard') n=10;
  else n = Math.max(10, parseInt(customN.value,10) || 10);
  g.n = n;
  const total = n*n; g.total = total;
  const numbers = shuffle(Array.from({length:total},(_,i)=>i+1));
  buildGridSVG(playerIndex, n, numbers, total, cellSize, cellFont);
}

/* Build grid from server-provided numbers */
function buildGridFromServer(playerIndex, n, numbers, total, countdown, config){
  const cellSize = parseInt(cellSizeInput.value,10) || 60;
  const cellFont = parseInt(cellFontInput.value,10) || 25;
  const g = state.grids[playerIndex];
  g.n = n; g.total = total;
  buildGridSVG(playerIndex, n, numbers, total, cellSize, cellFont);
  // set initial stats
  g.target = 1; g.found = 0; g.remaining = total; g.time = 0; g.best = g.best || null;
  updatePlayerUI(playerIndex);
  state.running = true;
}

/* Generic SVG builder */
function buildGridSVG(playerIndex, n, numbers, total, defaultCellSize, cellFont){
  const g = state.grids[playerIndex];
  const svg = g.card.querySelector('svg.grid-svg');
  g.svg = svg;
  // compute fit
  const wrap = g.card.querySelector('.svg-wrap');
  const wrapW = Math.max(160, wrap.clientWidth - 12);
  const wrapH = Math.max(160, window.innerHeight*0.35);
  const maxCellByW = Math.floor((wrapW - 2) / n);
  const maxCellByH = Math.floor((wrapH - 2) / n);
  let useCell = Math.min(defaultCellSize, maxCellByW, maxCellByH);
  if(useCell < 24) useCell = Math.max(24, Math.floor(Math.min(maxCellByW, maxCellByH)));
  const svgW = useCell * n; const svgH = useCell * n;
  svg.setAttribute('width', svgW); svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.innerHTML = '';
  g.cells = [];
  let usedColors = new Set();
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      const idx = r*n + c;
      const val = numbers[idx];
      let colorObj; let tries=0;
      do{ colorObj = randomColor(); tries++; } while(usedColors.has(colorObj.hex) && tries<50);
      usedColors.add(colorObj.hex);
      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', c*useCell); rect.setAttribute('y', r*useCell);
      rect.setAttribute('width', useCell); rect.setAttribute('height', useCell);
      rect.setAttribute('fill', colorObj.hex); rect.setAttribute('rx', Math.max(4, Math.floor(useCell*0.08)));
      rect.setAttribute('stroke','#ddd'); rect.setAttribute('data-val', val);
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', c*useCell + useCell/2); txt.setAttribute('y', r*useCell + useCell/2 + (cellFont*0.12));
      txt.setAttribute('font-size', Math.max(8, cellFont)); txt.setAttribute('font-family', 'inherit');
      txt.setAttribute('fill', '#000'); txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
      txt.setAttribute('pointer-events','none'); txt.textContent = val;
      const gEl = document.createElementNS('http://www.w3.org/2000/svg','g');
      gEl.appendChild(rect); gEl.appendChild(txt);
      gEl.setAttribute('data-val', val); gEl.style.cursor='pointer';
      // click: in localMode handle locally, else emit attempt to server
      gEl.addEventListener('click', ()=> {
        if(state.localMode){
          onCellClickLocal(playerIndex, val, gEl, rect, txt);
        } else {
          // emit attempt to server
          if(state.roomId) socket.emit('attempt', {roomId: state.roomId, val});
        }
      });
      svg.appendChild(gEl);
      g.cells.push({val, gEl, rect, txt});
    }
  }
}

/* Local mode click handler */
function onCellClickLocal(playerIndex, val, gEl, rect, txt){
  const g = state.grids[playerIndex];
  if(!state.running) return;
  if(val !== g.target){
    rect.setAttribute('stroke','#ff4d4d');
    setTimeout(()=> rect.setAttribute('stroke','#ddd'),200);
    return;
  }
  g.found++; g.target++; g.remaining = g.total - g.found;
  rect.setAttribute('opacity','0.6'); txt.setAttribute('fill','#fff'); rect.setAttribute('fill','#333');
  gEl.style.pointerEvents='none';
  updatePlayerUI(playerIndex);
  if(g.found >= g.total){ state.running=false; markPlayerDone(playerIndex); }
}

/* Mark cell as found (for any player) by value: find in that player's grid */
function markCellAsFound(playerIndex, val){
  const g = state.grids[playerIndex];
  if(!g || !g.cells) return;
  const cell = g.cells.find(c=> c.val === val);
  if(!cell) return;
  cell.rect.setAttribute('opacity','0.6'); cell.txt.setAttribute('fill','#fff'); cell.rect.setAttribute('fill','#333');
  cell.gEl && (cell.gEl.style.pointerEvents='none');
}

/* Flash wrong attempt locally */
function flashWrongLocal(val){
  // flash matching cell in my grid only
  const myGrid = state.grids[state.myIndex];
  if(!myGrid) return;
  const cell = myGrid.cells.find(c=> c.val === val);
  if(!cell) return;
  const orig = cell.rect.getAttribute('stroke');
  cell.rect.setAttribute('stroke','#ff4d4d');
  setTimeout(()=> cell.rect.setAttribute('stroke', orig || '#ddd'), 300);
}

/* UI updates */
function updatePlayerUI(playerIndex){
  const g = state.grids[playerIndex]; if(!g) return;
  const card = g.card;
  card.querySelector('.target-number').textContent = g.target > g.total ? '-' : g.target;
  card.querySelector('.found-count').textContent = g.found;
  card.querySelector('.remain-count').textContent = g.total - g.found;
  const timeEl = card.querySelector('.time-el'); timeEl.textContent = formatTime(g.time || 0);
  card.querySelector('.best-time').textContent = g.best ? formatTime(g.best) : '--';
}

/* mark player done */
function markPlayerDone(index){
  const head = state.grids[index].card.querySelector('.player-head .meta strong');
  if(head) head.textContent = `Player ${index+1} - Done`;
}

/* Create room and ask server to start */
function createRoomAndStart(){
  if(!state.socketConnected){ alert('Chưa kết nối tới server'); return; }
  const cfg = {
    level: levelSelect.value,
    customN: customN.value,
    playersCount: parseInt(playersCount.value,10),
    cellSize: parseInt(cellSizeInput.value,10),
    countdown: parseInt(countdownInput.value,10) || 600
  };
  socket.emit('createRoom', cfg);
  // after create, owner should call startGameRoom; we'll auto-start after slight delay to allow others to join
  setTimeout(()=> {
    if(state.roomId) socket.emit('startGameRoom', {roomId: state.roomId, configOverrides: cfg});
  }, 1500);
}

/* Join existing room */
function joinRoom(roomId){
  if(!roomId){ alert('Nhập Room ID'); return; }
  if(!state.socketConnected){ alert('Chưa kết nối tới server'); return; }
  socket.emit('joinRoom', {roomId});
}

/* Local-only start */
function startLocalGame(){
  state.localMode = true;
  renderPlayersAreaLayout();
  for(let i=0;i<state.players;i++){
    buildGridForLocal(i);
    // initialize stats
    const g = state.grids[i]; g.target = 1; g.found = 0; g.remaining = g.total; g.time = 0; g.best = g.best || null;
    updatePlayerUI(i);
  }
  state.running = true;
}

/* window resize: rebuild if needed */
let resizeTimeout;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(()=>{
    if(state.localMode && state.running){
      for(let i=0;i<state.players;i++) buildGridForLocal(i);
    } else if(!state.localMode && state.running && state.myIndex!=null){
      // request server re-init? simpler: rebuild client grids if they exist using stored numbers
      state.grids.forEach((g,i)=>{
        if(g && g.cells && g.cells.length>0){
          const nums = g.cells.map(c=> c.val);
          buildGridSVG(i, g.n, nums, g.total, parseInt(cellSizeInput.value,10)||60, parseInt(cellFontInput.value,10)||25);
          // restore found state by marking values < target
          for(const cell of g.cells){
            if(cell.val < g.target){
              cell.rect.setAttribute('opacity','0.6'); cell.txt.setAttribute('fill','#fff'); cell.rect.setAttribute('fill','#333');
              cell.gEl && (cell.gEl.style.pointerEvents='none');
            }
          }
        }
      });
    }
  },250);
});

/* initial render */
renderPlayersAreaLayout();

</script>
</body>
</html>
