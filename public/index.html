<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Number Hunt - Multiplayer Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOBBY SCREEN -->
  <div id="lobbyScreen" class="screen active">
    <div class="lobby-container">
      <div class="lobby-header">
        <h1 class="logo">🎯 NUMBER HUNT</h1>
        <p class="tagline">Find numbers in sequence. Beat the clock. Challenge friends.</p>
      </div>

      <div class="lobby-content">
        <div class="panel create-panel">
          <h2>Create Room</h2>
          
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="createName" placeholder="Enter your name" maxlength="20">
          </div>

          <div class="form-group">
            <label>Room Name</label>
            <input type="text" id="createRoomName" placeholder="Auto-generated if empty" maxlength="20">
          </div>

          <div class="form-group">
            <label>Difficulty Level</label>
            <div class="level-buttons">
              <button class="level-btn active" data-level="easy">Easy<br><small>5×5</small></button>
              <button class="level-btn" data-level="medium">Medium<br><small>7×7</small></button>
              <button class="level-btn" data-level="hard">Hard<br><small>10×10</small></button>
              <button class="level-btn" data-level="custom">Custom<br><small>n×n</small></button>
            </div>
          </div>

          <div id="customSizeGroup" class="form-group hidden">
            <label>Grid Size (n)</label>
            <input type="number" id="customSize" min="5" max="20" value="10">
          </div>

          <button id="createBtn" class="btn btn-primary full-width">Create Room</button>
        </div>

        <div class="panel join-panel">
          <h2>Join Room</h2>
          
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="joinName" placeholder="Enter your name" maxlength="20">
          </div>

          <div class="form-group">
            <label>Room Code</label>
            <input type="text" id="roomCode" placeholder="e.g. ABC123" maxlength="10" style="text-transform: uppercase;">
          </div>

          <button id="joinBtn" class="btn btn-secondary full-width">Join Room</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ROOM SCREEN -->
  <div id="roomScreen" class="screen">
    <div class="room-container">
      <div class="room-header">
        <div class="room-info">
          <h2 id="roomTitle">Room</h2>
          <span class="room-code" id="roomCodeDisplay"></span>
        </div>
        <button id="leaveBtn" class="btn btn-outline">Leave</button>
      </div>

      <div class="room-content">
        <div class="panel players-panel">
          <h3>Players (<span id="playerCount">0</span>/4)</h3>
          <div id="playersList" class="players-list"></div>
          <button id="startBtn" class="btn btn-success full-width hidden">Start Game</button>
        </div>

        <div class="panel chat-panel">
          <h3>Chat</h3>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Type message..." maxlength="100">
            <button id="sendBtn" class="btn btn-icon">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="game-container">
      <div class="game-header">
        <div class="timer" id="timer">10:00</div>
        <div class="current-number" id="currentNumber">1</div>
        <button id="exitGameBtn" class="btn btn-outline">Exit</button>
      </div>

      <div class="game-content">
        <div class="grid-section">
          <h3>Your Grid</h3>
          <div class="grid-wrapper">
            <svg id="gameGrid" class="game-grid"></svg>
          </div>
        </div>

        <div class="leaderboard-section">
          <h3>Players</h3>
          <div id="leaderboard" class="leaderboard"></div>

          <h3 style="margin-top: 20px;">Chat</h3>
          <div id="gameChatMessages" class="chat-messages"></div>
          <div class="chat-input">
            <input type="text" id="gameChatInput" placeholder="Type message..." maxlength="100">
            <button id="gameSendBtn" class="btn btn-icon">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- COMPLETION SCREEN -->
  <div id="completionScreen" class="screen">
    <div class="completion-container">
      <div class="completion-box">
        <h1 id="completionTitle">Game Complete!</h1>
        
        <div class="completion-stats">
          <div class="stat-box">
            <span class="stat-label">Your Time</span>
            <span class="stat-value" id="yourTime">0:00</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Best Time</span>
            <span class="stat-value" id="bestTime">0:00</span>
          </div>
        </div>

        <h3>Final Rankings</h3>
        <div id="finalLeaderboard" class="leaderboard"></div>

        <button id="continueBtn" class="btn btn-primary full-width">Back to Room</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
