<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NumGrid — Multiplayer Number Hunt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════
       LOBBY SCREEN
       ══════════════════════════════════ -->
  <div id="lobby-screen" class="screen active">

    <div class="logo">
      <h1>NUMGRID</h1>
      <p>MULTIPLAYER NUMBER HUNT</p>
    </div>

    <!-- Player Setup -->
    <div class="lobby-card">
      <h2>⚡ Người Chơi</h2>
      <div class="name-row">
        <input type="text" id="player-name-input" placeholder="Tên của bạn (để trống = ngẫu nhiên)" maxlength="20" />
        <button class="btn btn-secondary btn-sm" id="random-name-btn">🎲</button>
      </div>
    </div>

    <!-- Create Room -->
    <div class="lobby-card">
      <h2>🏠 Tạo Phòng Mới</h2>
      <div class="create-row">
        <select id="create-level">
          <option value="easy">Dễ — 5×5 (1-25)</option>
          <option value="medium" selected>Trung bình — 7×7 (1-49)</option>
          <option value="hard">Khó — 10×10 (1-100)</option>
          <option value="custom">Siêu khó — N×N</option>
        </select>
        <input type="number" id="create-custom-n" placeholder="N≥10" min="10" max="30" value="12" style="display:none" />
        <button class="btn btn-primary" id="create-room-btn">Tạo Phòng</button>
      </div>
    </div>

    <!-- Room Lobby -->
    <div class="lobby-card">
      <h2>🎮 Phòng Có Sẵn <button class="btn btn-secondary btn-sm" id="refresh-lobby-btn" style="margin-left:8px">↻</button></h2>
      <div class="rooms-list" id="rooms-list">
        <div class="no-rooms">Chưa có phòng nào. Hãy tạo một phòng mới!</div>
      </div>
    </div>

  </div><!-- /lobby-screen -->


  <!-- ══════════════════════════════════
       GAME SCREEN
       ══════════════════════════════════ -->
  <div id="game-screen" class="screen">

    <!-- Header -->
    <div id="game-header">
      <div class="gh-left">
        <button class="btn btn-secondary btn-sm" id="leave-room-btn">← Rời</button>
        <span class="gh-room-name" id="gh-room-name">ROOM</span>
      </div>
      <div id="target-display">1</div>
      <div class="gh-right">
        <div id="countdown-display">10:00</div>
        <button class="btn btn-secondary btn-sm" id="restart-btn" style="display:none">↺ Restart</button>
      </div>
    </div>

    <!-- Players grids area -->
    <div id="players-area"></div>

    <!-- Chat -->
    <div id="chat-panel">
      <div class="chat-toggle" id="chat-toggle">
        <span>💬 CHAT</span>
        <span>▲</span>
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Nhập tin nhắn…" maxlength="200" />
        <button class="btn btn-primary btn-sm" id="chat-send-btn">Gửi</button>
      </div>
    </div>

  </div><!-- /game-screen -->

</div><!-- /app -->

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Thông báo</h2>
    <p id="modal-body"></p>
    <div class="btn-row">
      <button class="btn btn-primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
