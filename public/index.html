<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid Finder - Multiplayer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="root">
    <header class="topbar">
      <div class="brand">GRID FINDER</div>
      <div id="playerInfo" class="player-info"></div>
    </header>

    <main class="main">
      <section id="screens">

        <div id="screen-welcome" class="screen active">
          <h1>Grid Finder</h1>
          <input id="inputName" placeholder="Tên (tùy chọn)" maxlength="15"/>
          <div class="row">
            <button id="btnSingle" class="btn">Chơi Single</button>
            <button id="btnLobby" class="btn secondary">Multiplayer</button>
          </div>
        </div>

        <div id="screen-single" class="screen">
          <h2>Chọn cấp độ</h2>
          <div class="modes">
            <button class="mode" data-level="easy">Dễ<br/>5x5</button>
            <button class="mode" data-level="medium">Trung bình<br/>7x7</button>
            <button class="mode" data-level="hard">Khó<br/>10x10</button>
            <div class="mode custom">
              <label>Siêu khó n x n (n ≥ 10)</label>
              <input id="customN" type="number" min="10" value="12"/>
              <button id="startCustom" class="btn">Bắt đầu</button>
            </div>
          </div>
          <button class="btn back">Quay lại</button>
        </div>

        <div id="screen-lobby" class="screen">
          <h2>Lobby</h2>
          <div class="lobby-actions">
            <select id="selectLevelLobby">
              <option value="easy">Dễ</option>
              <option value="medium">Trung bình</option>
              <option value="hard">Khó</option>
              <option value="custom">Siêu khó</option>
            </select>
            <input id="lobbyCustomN" type="number" min="10" placeholder="n (n≥10)" style="width:110px"/>
            <button id="btnCreateRoom" class="btn">Tạo phòng</button>
            <button id="btnRefreshRooms" class="btn secondary">Làm mới</button>
          </div>

          <div id="roomsList" class="rooms"></div>
          <div class="back-row"><button class="btn back">Quay lại</button></div>
        </div>

        <div id="screen-room" class="screen">
          <h2 id="roomTitle">Phòng</h2>
          <div class="room-top">
            <div id="roomPlayers" class="room-players"></div>
            <div class="room-controls">
              <button id="btnStartGame" class="btn">Bắt đầu</button>
              <button id="btnLeaveRoom" class="btn secondary">Rời phòng</button>
            </div>
          </div>

          <div class="game-area">
            <div class="left-panel">
              <div class="hud">
                <div>Need: <span id="needNumber" class="needNumber">1</span></div>
                <div>Countdown: <span id="countdown">600</span>s</div>
                <div>Time: <span id="timeElapsed">0</span>s</div>
                <div>Best: <span id="bestTime">-</span>s</div>
              </div>
              <div class="chat">
                <div id="chatBox" class="chatBox"></div>
                <div class="chatInput">
                  <input id="chatMsg" placeholder="Gõ tin nhắn..." />
                  <button id="btnSendMsg" class="btn small">Gửi</button>
                </div>
              </div>
            </div>

            <div class="grids-area" id="gridsArea"></div>
          </div>
        </div>

      </section>
    </main>

    <footer class="footer">© Grid Finder</footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
