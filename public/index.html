<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <div class="controls">
      <label>Room <input id="roomId" value="room1"></label>
      <label>Name <input id="name" value="Player"></label>
      <button id="joinBtn" class="btn">Join</button>
      <button id="leaveBtn" class="btn" disabled>Leave</button>
      <label>Players <select id="playersCount"><option>1</option><option>2</option><option>3</option><option selected>4</option></select></label>
      <label>Level <select id="level"><option value="easy">Dễ (5x5)</option><option value="medium">Trung bình (7x7)</option><option value="hard">Khó (10x10)</option><option value="custom">Siêu khó (tùy n)</option></select></label>
      <label id="customNlabel" style="display:none">n <input id="customN" type="number" min="10" value="12"></label>
      <label>Cell size <input id="cellSize" type="number" value="60" min="20"></label>
      <label>Font size (cell) <input id="fontCell" type="number" value="25" min="8"></label>
      <label>Target font <input id="fontTarget" type="number" value="65" min="12"></label>
      <label>Time (s) <input id="countdown" type="number" value="600" min="10"></label>
      <button id="startBtn" class="btn">Start</button>
    </div>
  </div>

  <div class="container" id="playersContainer">
    <!-- player-area clones inserted here -->
  </div>

  <div class="footer">
    <div>
      <span class="small">Status:</span> <span id="status">Not connected</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="chat" id="chatBox"></div>
      <input id="chatInput" placeholder="Chat..." />
      <button id="sendChat" class="btn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
