<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Grid Game</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Lobby Screen -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-container">
      <h1>🔢 Number Grid Game</h1>
      
      <div class="lobby-content">
        <div class="lobby-section">
          <h2>Create Room</h2>
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="create-player-name" placeholder="Auto-generated if empty">
          </div>
          <div class="form-group">
            <label>Game Level</label>
            <select id="create-level">
              <option value="easy">Easy (5x5, 1-25)</option>
              <option value="medium">Medium (7x7, 1-49)</option>
              <option value="hard">Hard (10x10, 1-100)</option>
              <option value="extreme">Extreme (12x12, 1-144)</option>
            </select>
          </div>
          <button id="create-room-btn" class="btn btn-primary">Create Room</button>
        </div>

        <div class="lobby-divider">OR</div>

        <div class="lobby-section">
          <h2>Join Room</h2>
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="join-player-name" placeholder="Auto-generated if empty">
          </div>
          <button id="refresh-lobby-btn" class="btn btn-secondary">Refresh Rooms</button>
          <div id="rooms-list" class="rooms-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Room Screen -->
  <div id="game-screen" class="screen">
    <div class="game-container">
      <!-- Header -->
      <header class="game-header">
        <div class="header-left">
          <h2 id="room-name"></h2>
          <span id="room-id" class="room-id"></span>
        </div>
        <div class="header-center">
          <div class="current-number-display">
            <span id="current-number">1</span>
          </div>
        </div>
        <div class="header-right">
          <div class="timer-container">
            <span id="timer" class="timer">10:00</span>
          </div>
          <button id="leave-room-btn" class="btn btn-small">Leave</button>
        </div>
      </header>

      <!-- Main Content -->
      <div class="game-content">
        <!-- Players Grids -->
        <div id="players-grids-container" class="players-grids-container"></div>
      </div>

      <!-- Footer with Chat -->
      <div class="game-footer">
        <div class="chat-container">
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-group">
            <input 
              type="text" 
              id="chat-input" 
              placeholder="Nhập tin nhắn..."
              maxlength="100"
            >
            <button id="send-chat-btn" class="btn btn-small">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal cho custom size -->
  <div id="custom-size-modal" class="modal">
    <div class="modal-content">
      <h3>Custom Game Size</h3>
      <div class="form-group">
        <label>Grid Size (n x n, n >= 10)</label>
        <input type="number" id="custom-size-input" min="10" value="10">
      </div>
      <div class="modal-buttons">
        <button id="custom-size-confirm" class="btn btn-primary">Confirm</button>
        <button id="custom-size-cancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
