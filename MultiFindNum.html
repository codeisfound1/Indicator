<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grid Finder — SVG</title>
<style>
  :root{
    --cell-size:60px;       /* Kích thước ô (thay đổi) */
    --cell-font-size:25px;  /* Font size trong ô (thay đổi) */
    --target-font-size:65px;/* Font size hiển thị số đang tìm (thay đổi) */
    --countdown-default:120;/* giây */
  }
  body{font-family:system-ui,Segoe UI,Roboto,Arial; margin:16px; color:#111;}
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
  label{font-size:14px;}
  select,input[type="number"]{padding:6px;border-radius:6px;border:1px solid #ccc;}
  button{padding:8px 12px;border-radius:6px;border:1px solid #888;background:#f2f2f2;cursor:pointer;}
  button.primary{background:#2b8aef;color:#fff;border-color:#1976d2;}
  .top-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
  .panel{padding:10px;border:1px solid #e0e0e0;border-radius:8px;background:#fafafa;}
  #gameArea{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
  #svgWrap{width:max-content;}
  svg{display:block; background:#fff; border-radius:6px;}
  .hud{display:flex;flex-direction:column;gap:8px;min-width:240px;}
  .big-target{font-weight:700; font-size:var(--target-font-size); text-align:center; padding:8px 12px; border-radius:8px; background:#fff;}
  .info{font-size:14px;}
  .players{display:flex;gap:8px;flex-direction:column;}
  .player{padding:8px;border-radius:6px;background:#fff;display:flex;justify-content:space-between;align-items:center;}
  .player.active{outline:3px solid #ffd54f;}
  .footer{margin-top:12px;font-size:13px;color:#555;}
  .grid-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .status-line{margin-top:8px;font-size:14px;}
  .timer{font-weight:700;}
  .cell-text{pointer-events:none;dominant-baseline:central;text-anchor:middle; font-family:inherit;}
  .small{font-size:13px;color:#666;}
  .muted{color:#777;font-size:13px;}
  .flex-row{display:flex;gap:8px;align-items:center;}
</style>
</head>
<body>

<div class="controls">
  <div class="panel">
    <div class="flex-row">
      <label for="difficulty">Cấp độ:</label>
      <select id="difficulty">
        <option value="easy">Dễ — 5x5 (1–25)</option>
        <option value="medium">Trung bình — 7x7 (1–49)</option>
        <option value="hard">Khó — 10x10 (1–100)</option>
      </select>
      <label for="players">Người chơi:</label>
      <select id="players">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
      <label for="countdown">Countdown (s):</label>
      <input id="countdown" type="number" min="10" value="120" style="width:80px;">
      <button id="startBtn" class="primary">Bắt đầu</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div style="margin-top:8px;" class="small">Font ô:
      <input id="cellFont" type="number" value="25" min="8" style="width:70px;">px
      Target font:
      <input id="targetFont" type="number" value="65" min="16" style="width:70px;">px
    </div>
  </div>
</div>

<div id="gameArea">
  <div id="svgWrap" class="panel">
    <!-- SVG grid will be injected here -->
    <div id="svgContainer"></div>
  </div>

  <div class="hud panel">
    <div class="big-target" id="currentTarget">—</div>

    <div class="info">
      <div class="flex-row">
        <div>Thời gian còn lại: <span class="timer" id="timeLeft">--:--</span></div>
      </div>
      <div class="status-line">Thời gian hoàn thành: <span id="finishTime">—</span></div>
      <div class="status-line">Best time (session): <span id="bestTime">—</span></div>
    </div>

    <div class="players" id="playersPanel" style="margin-top:6px;">
      <!-- Player panels -->
    </div>

    <div style="margin-top:8px;">
      <button id="shuffleColors">Đổi màu ô</button>
      <button id="toggleMultiplayer">Chế độ turn (bật/tắt)</button>
    </div>

    <div class="footer muted">
      Nhấp các ô theo thứ tự từ 1 tới số cuối cùng. Mỗi ô có màu ngẫu nhiên khác màu chữ số.
    </div>
  </div>
</div>

<script>
/* === Cấu hình mặc định (có thể thay đổi) === */
const CONFIG = {
  sizes:{
    easy:{n:5, max:25},
    medium:{n:7, max:49},
    hard:{n:10, max:100}
  },
  cellSize: parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size')) || 60,
  cellFontSize: 25,
  targetFontSize: 65
};

/* === Trạng thái trò chơi === */
let state = {
  gridN:5,
  maxNumber:25,
  numbers:[],        // mảng số theo vị trí (shuffled)
  cellColors:[],     // màu nền cho mỗi ô
  numberToCellIndex:new Map(),
  nextNumber:1,
  countdown:120,
  timerId:null,
  started:false,
  startTime: null,
  finishTime:null,
  bestTimeKey: null,
  players:1,
  scores:[],
  currentPlayerIndex:0,
  turnMode:true
};

/* Helpers */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function secToMMSS(s){
  if(s<0) s=0;
  const m=Math.floor(s/60), sec=s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function nowSeconds(){ return Math.floor(Date.now()/1000); }

/* Color utilities */
function randomDistinctColor(excludeColors){
  // generate random HSL with good saturation/lightness and avoid the excludeColors set by checking hex similarity
  for(let attempts=0;attempts<40;attempts++){
    const h = Math.floor(Math.random()*360);
    const s = randInt(60,85);
    const l = randInt(35,65);
    const hex = hslToHex(h,s,l);
    if(!excludeColors.has(hex)) return hex;
  }
  // fallback: pick a color not in excludeColors by enumerating
  for(let h=0;h<360;h+=30){
    const hex = hslToHex(h,70,50);
    if(!excludeColors.has(hex)) return hex;
  }
  return '#cccccc';
}
function hslToHex(h,s,l){
  s/=100; l/=100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l,1-l);
  const f = n => {
    const val = l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n),1)));
    return Math.round(255*val).toString(16).padStart(2,'0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

/* DOM refs */
const difficultyEl = document.getElementById('difficulty');
const playersEl = document.getElementById('players');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const svgContainer = document.getElementById('svgContainer');
const currentTargetEl = document.getElementById('currentTarget');
const timeLeftEl = document.getElementById('timeLeft');
const finishTimeEl = document.getElementById('finishTime');
const bestTimeEl = document.getElementById('bestTime');
const playersPanel = document.getElementById('playersPanel');
const countdownInput = document.getElementById('countdown');
const cellFontInput = document.getElementById('cellFont');
const targetFontInput = document.getElementById('targetFont');
const shuffleColorsBtn = document.getElementById('shuffleColors');
const toggleMultiplayerBtn = document.getElementById('toggleMultiplayer');

/* Initialize UI */
function applyFontSizes(){
  CONFIG.cellFontSize = parseInt(cellFontInput.value)||25;
  CONFIG.targetFontSize = parseInt(targetFontInput.value)||65;
  document.documentElement.style.setProperty('--target-font-size', CONFIG.targetFontSize+'px');
  document.querySelectorAll('.cell-text').forEach(t => t.style.fontSize = CONFIG.cellFontSize+'px');
}
cellFontInput.addEventListener('change',()=>{
  applyFontSizes();
});
targetFontInput.addEventListener('change',()=>{
  applyFontSizes();
});

/* Start/reset logic */
startBtn.addEventListener('click',startGame);
resetBtn.addEventListener('click',resetGame);
shuffleColorsBtn.addEventListener('click',()=>{
  if(!state.started) renderGrid(); else regenerateColorsAndApply();
});
toggleMultiplayerBtn.addEventListener('click',()=>{
  state.turnMode = !state.turnMode;
  renderPlayersPanel();
});

/* Setup difficulty/players changes */
difficultyEl.addEventListener('change',()=>{
  const v = difficultyEl.value;
  state.gridN = CONFIG.sizes[v].n;
  state.maxNumber = CONFIG.sizes[v].max;
});
playersEl.addEventListener('change',()=>{
  state.players = parseInt(playersEl.value)||1;
});

function resetGame(){
  stopTimer();
  state.started=false;
  state.nextNumber=1;
  state.finishTime=null;
  state.startTime=null;
  state.scores = Array(state.players).fill(0);
  state.currentPlayerIndex = 0;
  clearGridDisplay();
  updateHUD();
  renderPlayersPanel();
}

/* Timer */
function startTimer(seconds){
  stopTimer();
  state.countdown = seconds;
  state.startTime = nowSeconds();
  timeLeftEl.textContent = secToMMSS(state.countdown);
  state.timerId = setInterval(()=>{
    state.countdown--;
    timeLeftEl.textContent = secToMMSS(state.countdown);
    if(state.countdown<=0){
      stopTimer();
      onTimeUp();
    }
  },1000);
}
function stopTimer(){ if(state.timerId) clearInterval(state.timerId); state.timerId=null; }

/* Game flow */
function startGame(){
  // apply font settings
  applyFontSizes();

  // configure
  const diff = difficultyEl.value;
  state.gridN = CONFIG.sizes[diff].n;
  state.maxNumber = CONFIG.sizes[diff].max;
  state.players = parseInt(playersEl.value)||1;
  state.scores = Array(state.players).fill(0);
  state.currentPlayerIndex = 0;
  state.turnMode = (state.players>1); // default enable turn if >1
  const seconds = parseInt(countdownInput.value) || 120;
  state.countdown = seconds;
  state.bestTimeKey = `grid_best_${state.gridN}_${state.players}`;

  // generate numbers and colors
  generateGridData();

  // render
  renderGrid();
  renderPlayersPanel();

  // reset counters
  state.nextNumber = 1;
  state.finishTime = null;
  state.started = true;

  // HUD
  updateHUD();

  // start timer
  startTimer(seconds);
}

function generateGridData(){
  // numbers 1..maxNumber distributed into grid cells of size gridN*gridN
  const totalCells = state.gridN * state.gridN;
  // pick numbers: if totalCells equals maxNumber, use 1..maxNumber; otherwise choose a subset of 1..maxNumber of size totalCells (but user required ranges: easy uses 1..25 exact etc.)
  // Requirement: easy: 1-25 for 5x5, medium:1-49 for 7x7, hard:1-100 for 10x10
  // That implies numbers set is 1..maxNumber (totalCells == maxNumber for these specs). We'll assume that mapping.
  const nums = Array.from({length: state.maxNumber}, (_,i)=>i+1);
  shuffle(nums);
  const numbersForGrid = nums.slice(0, totalCells);
  // If the specification intended 10x10 uses 1..100 -> totalCells 100, OK.
  state.numbers = numbersForGrid;
  state.numberToCellIndex.clear();
  numbersForGrid.forEach((num,idx)=> state.numberToCellIndex.set(num, idx));

  // colors for each cell: ensure color different from text color (text color we will set as either black or white depending on background)
  const used = new Set();
  state.cellColors = [];
  for(let i=0;i<totalCells;i++){
    const c = randomDistinctColor(used);
    used.add(c);
    state.cellColors.push(c);
  }
}

/* Render SVG grid */
function clearGridDisplay(){ svgContainer.innerHTML = ''; }

function renderGrid(){
  clearGridDisplay();
  const n = state.gridN;
  const cell = CONFIG.cellSize;
  const width = n * cell;
  const height = n * cell;
  const xmlns = "http://www.w3.org/2000/svg";

  const svg = document.createElementNS(xmlns,'svg');
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

  // defs for hover style (optional)
  const defs = document.createElementNS(xmlns,'defs');
  svg.appendChild(defs);

  // create cells
  for(let row=0; row<n; row++){
    for(let col=0; col<n; col++){
      const idx = row*n + col;
      const x = col * cell, y = row * cell;
      const g = document.createElementNS(xmlns,'g');
      g.setAttribute('transform', `translate(${x},${y})`);
      g.setAttribute('data-idx', idx);

      // background rect
      const rect = document.createElementNS(xmlns,'rect');
      rect.setAttribute('x',0); rect.setAttribute('y',0);
      rect.setAttribute('width',cell); rect.setAttribute('height',cell);
      const bg = state.cellColors[idx] || '#eee';
      rect.setAttribute('fill', bg);
      rect.setAttribute('rx','6');
      rect.setAttribute('ry','6');
      rect.style.cursor = 'pointer';

      // number text
      const num = state.numbers[idx];
      const text = document.createElementNS(xmlns,'text');
      text.classList.add('cell-text');
      text.setAttribute('x', cell/2);
      text.setAttribute('y', cell/2 + 2); // center approx
      text.setAttribute('fill', pickTextColor(bg));
      text.setAttribute('font-size', CONFIG.cellFontSize);
      text.textContent = num;

      // attach click handler
      rect.addEventListener('click', ()=> onCellClick(idx, rect, text));
      text.addEventListener('click', ()=> onCellClick(idx, rect, text));

      g.appendChild(rect);
      g.appendChild(text);
      svg.appendChild(g);
    }
  }

  svgContainer.appendChild(svg);

  // show target
  updateHUD();
}

/* pick text color (black/white) for contrast */
function pickTextColor(bgHex){
  // convert hex to rgb
  const rgb = hexToRgb(bgHex);
  if(!rgb) return '#000';
  const luminance = (0.299*rgb.r + 0.587*rgb.g + 0.114*rgb.b)/255;
  return luminance > 0.6 ? '#000' : '#fff';
}
function hexToRgb(hex){
  if(!hex) return null;
  const h = hex.replace('#','');
  if(h.length===3){
    return {r:parseInt(h[0]+h[0],16), g:parseInt(h[1]+h[1],16), b:parseInt(h[2]+h[2],16)};
  } else if(h.length===6){
    return {r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16)};
  }
  return null;
}

/* When cell clicked */
function onCellClick(idx, rectEl, textEl){
  if(!state.started) return;
  const clickedNumber = state.numbers[idx];
  if(clickedNumber !== state.nextNumber){
    // wrong click: optionally flash red (but do not progress)
    flashWrong(rectEl);
    return;
  }

  // correct click
  markCellFound(rectEl, textEl);
  // scoring & multiplayer turn handling
  if(state.players>1 && state.turnMode){
    // award point to current player
    state.scores[state.currentPlayerIndex] += 1;
    // move to next player (round-robin)
    state.currentPlayerIndex = (state.currentPlayerIndex + 1) % state.players;
  } else if(state.players>1 && !state.turnMode){
    // simultaneous: all players share progress (no turns) — no score change here
  }

  state.nextNumber++;
  updateHUD();
  renderPlayersPanel();

  // check finish
  if(state.nextNumber > state.maxNumber){
    // finished
    stopTimer();
    state.finishTime = (nowSeconds() - state.startTime);
    showFinish();
  }
}

function flashWrong(el){
  const orig = el.getAttribute('stroke') || 'none';
  el.setAttribute('stroke','#ff5252');
  el.setAttribute('stroke-width','3');
  setTimeout(()=>{ el.setAttribute('stroke', orig); el.setAttribute('stroke-width','0'); }, 350);
}

function markCellFound(rectEl, textEl){
  rectEl.setAttribute('opacity','0.45');
  // cross out number or style
  textEl.setAttribute('text-decoration','line-through');
  textEl.setAttribute('fill', '#666');
  rectEl.style.pointerEvents = 'none';
}

/* HUD updates */
function updateHUD(){
  currentTargetEl.textContent = state.nextNumber <= state.maxNumber ? state.nextNumber : 'Hoàn thành';
  currentTargetEl.style.fontSize = CONFIG.targetFontSize + 'px';
  timeLeftEl.textContent = secToMMSS(state.countdown);
  finishTimeEl.textContent = state.finishTime ? formatSecondsWithMs(state.finishTime) : '—';
  // best time from sessionStorage
  const bestKey = state.bestTimeKey || `grid_best_${state.gridN}_${state.players}`;
  const b = sessionStorage.getItem(bestKey);
  bestTimeEl.textContent = b ? b : '—';
}

function formatSecondsWithMs(sec){
  // sec is integer seconds; show mm:ss
  return secToMMSS(sec);
}

function showFinish(){
  updateHUD();
  // update best
  const bestKey = state.bestTimeKey || `grid_best_${state.gridN}_${state.players}`;
  const prev = sessionStorage.getItem(bestKey);
  if(!prev || state.finishTime < parseInt(prev,10)){
    sessionStorage.setItem(bestKey, String(state.finishTime));
    bestTimeEl.textContent = String(state.finishTime);
  }
  // disable further clicks
  state.started=false;
}

/* Time up */
function onTimeUp(){
  state.started=false;
  updateHUD();
  // reveal message in currentTarget
  currentTargetEl.textContent = 'Hết giờ';
}

/* render players panel */
function renderPlayersPanel(){
  playersPanel.innerHTML = '';
  for(let i=0;i<state.players;i++){
    const div = document.createElement('div');
    div.className = 'player' + (i===state.currentPlayerIndex && state.turnMode ? ' active' : '');
    div.innerHTML = `<div><strong>Người ${i+1}</strong></div><div><span class="muted">Điểm:</span> <strong>${state.scores[i]||0}</strong></div>`;
    playersPanel.appendChild(div);
  }
}

/* regenerate colors without changing numbers (used when shuffleColors pressed mid-game) */
function regenerateColorsAndApply(){
  const used = new Set();
  const total = state.gridN * state.gridN;
  for(let i=0;i<total;i++){
    const c = randomDistinctColor(used);
    used.add(c);
    state.cellColors[i] = c;
  }
  // apply to existing svg rectangles and text colors
  const svg = svgContainer.querySelector('svg');
  if(!svg) return;
  const rects = svg.querySelectorAll('rect');
  rects.forEach((r,idx)=>{
    const fill = state.cellColors[idx];
    r.setAttribute('fill', fill);
    const text = r.parentNode.querySelector('text');
    if(text){
      text.setAttribute('fill', pickTextColor(fill));
      text.style.fontSize = CONFIG.cellFontSize + 'px';
    }
  });
}

/* Utilities & init */
function initVarsFromUI(){
  // set defaults
  const diff = difficultyEl.value;
  state.gridN = CONFIG.sizes[diff].n;
  state.maxNumber = CONFIG.sizes[diff].max;
  state.players = parseInt(playersEl.value)||1;
  CONFIG.cellFontSize = parseInt(cellFontInput.value) || CONFIG.cellFontSize;
  CONFIG.targetFontSize = parseInt(targetFontInput.value) || CONFIG.targetFontSize;
  document.documentElement.style.setProperty('--target-font-size', CONFIG.targetFontSize+'px');
  state.bestTimeKey = `grid_best_${state.gridN}_${state.players}`;
}

initVarsFromUI();
renderPlayersPanel();
updateHUD();

/* Expose some small API for debugging in console (optional) */
window.GridFinder = {
  startGame, resetGame, renderGrid, state
};

</script>
</body>
</html>
