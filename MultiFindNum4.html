<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grid Generator — Responsive Multiplayer</title>
<style>
  :root{
    --cell-size:60px;
    --cell-font:25px;
    --target-font:65px;
    --gap:6px;
  }
  body{
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    margin:12px;
    background:#f6f7f9;
    color:#111;
  }
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .top-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .grids-wrap{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;align-items:flex-start;}
  .player-area{background:#fff;padding:10px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);min-width:220px;display:flex;flex-direction:column;align-items:center}
  .player-title{font-weight:700;margin-bottom:8px;font-size:14px}
  .player-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;width:100%}
  .target-box{display:flex;align-items:center;justify-content:center;width:120px;height:64px;background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);flex-direction:column}
  .target-number{font-weight:700;font-size:var(--target-font);line-height:1}
  .target-label{font-size:12px;color:#666}
  .grid{display:grid;gap:var(--gap);touch-action:manipulation;user-select:none;overflow:hidden}
  .cell{display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#fff;font-weight:700}
  .cell.disabled{opacity:0.45;pointer-events:none}
  .metrics{margin-top:8px;font-size:13px;color:#333}
  @media (max-width:900px){:root{--target-font:48px}}
  @media (max-width:420px){:root{--target-font:40px;--gap:4px}}
</style>
</head>
<body>

<div class="top-row">
  <div class="controls">
    <label>Level:
      <select id="level">
        <option value="easy">Dễ 5×5 (1-25)</option>
        <option value="medium">Trung bình 7×7 (1-49)</option>
        <option value="hard">Khó 10×10 (1-100)</option>
        <option value="custom">Siêu khó (nxn)</option>
      </select>
    </label>

    <label id="customNlabel" style="display:none">n:
      <input id="customN" type="number" min="10" value="12" style="width:72px"/>
    </label>

    <label>Target font (px):
      <input id="targetFont" type="number" min="18" value="65" style="width:80px"/>
    </label>

    <label>Time (s):
      <input id="countdown" type="number" min="10" value="600" style="width:90px"/>
    </label>

    <label>Players:
      <input id="players" type="number" min="1" max="4" value="1" style="width:64px"/>
    </label>

    <button id="startBtn">Start</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>

<div class="grids-wrap" id="gridsWrap"></div>

<script>
/* ---------- Helpers ---------- */
function formatTimeSec(s){ if(s<0)s=0; const mm=Math.floor(s/60).toString().padStart(2,'0'); const ss=Math.floor(s%60).toString().padStart(2,'0'); return `${mm}:${ss}`; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function randomColor(){ const h=Math.floor(Math.random()*360), s=60+Math.floor(Math.random()*30), l=45+Math.floor(Math.random()*10); return `hsl(${h} ${s}% ${l}%)`; }
function contrastColor(c){ const tmp=document.createElement('div'); tmp.style.color=c; document.body.appendChild(tmp); const cs=getComputedStyle(tmp).color; document.body.removeChild(tmp); const p=cs.match(/\d+/g); if(!p) return '#000'; const r=+p[0],g=+p[1],b=+p[2]; const bright=(r*299+g*587+b*114)/1000; return bright>150? '#000':'#fff'; }

/* ---------- Auto-sizing logic (landscape-aware) ---------- */
function computeOptimalCellSize(n, players){
  const gap = 6;
  const vw = Math.max(window.innerWidth || 360, 360);
  const vh = Math.max(window.innerHeight || 600, 600);
  const controlsH = 140;
  const availableH = Math.max(200, vh - controlsH - 32);

  const isLandscape = vw > vh;

  const candidateLayouts = [];
  if(isLandscape){
    candidateLayouts.push({cols: players});
    if(players > 1) candidateLayouts.push({cols: Math.ceil(players/2)});
  } else {
    candidateLayouts.push({cols: Math.min(players, 2)});
    candidateLayouts.push({cols: players});
  }

  let best = {cellSize:20, cols:1};
  for(const layout of candidateLayouts){
    const cols = layout.cols;
    const rows = Math.ceil(players/cols);
    const totalGapH = (cols-1)*16;
    const colWidth = Math.floor((vw - totalGapH - 24) / cols);
    const rowHeight = Math.floor((availableH - (rows-1)*16) / rows);

    const maxCellW = Math.floor((colWidth - (n-1)*gap) / n);
    const maxCellH = Math.floor((rowHeight - (n-1)*gap) / n);
    let cellSize = Math.max(20, Math.min(maxCellW, maxCellH));
    cellSize = Math.min(cellSize, 140);

    if(cellSize > best.cellSize){
      best = {cellSize, cols};
    }
  }

  if(best.cellSize <= 20 && isLandscape){
    const rows = 1; const cols = players;
    const rowHeight = availableH;
    const maxCellH = Math.floor((rowHeight - (n-1)*gap) / n);
    best.cellSize = Math.max(16, Math.min(120, maxCellH));
    best.cols = cols;
  }

  return best.cellSize;
}

/* ---------- PlayerGame class ---------- */
class PlayerGame {
  constructor(idx, n, cellSize, countdown, container, targetFont){
    this.idx=idx; this.n=n; this.cellSize=cellSize; this.countdown=countdown; this.container=container; this.targetFont=targetFont;
    this.current=1; this.started=false; this.ended=false; this.remaining=countdown; this.startTs=null; this.finish=null;
    this.bestKey = `best_p_${idx}_n${n}`;
    this.init();
  }
  init(){
    this.container.innerHTML='';
    const title = document.createElement('div'); title.className='player-title'; title.textContent=`Player ${this.idx+1}`; this.container.appendChild(title);
    const header = document.createElement('div'); header.className='player-header';
    const tbox = document.createElement('div'); tbox.className='target-box'; tbox.innerHTML=`<div class="target-label">Cần tìm</div><div class="target-number" id="tP${this.idx}">${this.current}</div>`;
    tbox.querySelector('.target-number').style.fontSize = this.targetFont + 'px';
    header.appendChild(tbox);
    const timerBox = document.createElement('div'); timerBox.style.textAlign='right'; timerBox.innerHTML = `<div style="font-size:12px;color:#666">Còn</div><div id="timerP${this.idx}" style="font-weight:700">${formatTimeSec(this.countdown)}</div><div style="font-size:12px;color:#666">Best: <span id="bestP${this.idx}">—</span></div>`;
    header.appendChild(timerBox);
    this.container.appendChild(header);

    const grid = document.createElement('div'); grid.className='grid';
    grid.style.gridTemplateColumns = `repeat(${this.n}, ${this.cellSize}px)`;
    grid.style.gridTemplateRows = `repeat(${this.n}, ${this.cellSize}px)`;
    grid.style.gap = '6px';
    this.grid = grid;
    this.container.appendChild(grid);

    const meta = document.createElement('div'); meta.className='metrics'; meta.innerHTML=`Đã tìm: <span class="found">0</span> / ${this.n*this.n}`; this.container.appendChild(meta);
    this.foundEl = meta.querySelector('.found');

    this.populate();
    const best = this.getBest(); if(best) this.container.querySelector('#bestP'+this.idx).textContent = formatTimeSec(best);
  }
  populate(){
    const total = this.n*this.n;
    const arr=[]; for(let i=1;i<=total;i++) arr.push(i); shuffle(arr);
    for(let i=0;i<total;i++){
      const v=arr[i];
      const btn=document.createElement('button'); btn.className='cell'; btn.textContent=v; btn.dataset.value=v;
      btn.style.width = this.cellSize + 'px';
      btn.style.height = this.cellSize + 'px';
      btn.style.fontSize = Math.max(10, Math.round(this.cellSize*0.42)) + 'px';
      const bg = randomColor(); btn.style.background = bg; btn.style.color = contrastColor(bg);
      btn.addEventListener('click', ()=> this.onClick(btn, v));
      this.grid.appendChild(btn);
    }
  }
  onClick(btn, v){
    if(this.ended) return;
    if(!this.started) this.start();
    if(v === this.current){
      btn.classList.add('disabled');
      btn.style.outline = '3px solid rgba(0,0,0,0.06)';
      this.current++;
      this.foundEl.textContent = this.current-1;
      this.updateTarget();
      if(this.current > this.n*this.n) this.finishSuccess();
    } else {
      btn.animate([{transform:'scale(1)'},{transform:'scale(0.95)'},{transform:'scale(1)'}], {duration:120});
    }
  }
  start(){
    this.started=true; this.startTs = Date.now();
    this.remaining = this.countdown;
    this.interval = setInterval(()=>{
      this.remaining = this.countdown - Math.floor((Date.now()-this.startTs)/1000);
      if(this.remaining <= 0){ this.remaining=0; clearInterval(this.interval); this.endFail(); }
      const el = this.container.querySelector('#timerP'+this.idx); if(el) el.textContent = formatTimeSec(this.remaining);
    }, 300);
  }
  updateTarget(){ const el = this.container.querySelector('#tP'+this.idx); if(el) el.textContent = this.current <= this.n*this.n ? this.current : '—'; }
  finishSuccess(){ this.ended=true; clearInterval(this.interval); const took = Math.floor((Date.now()-this.startTs)/1000); this.finish=took; const prev=this.getBest(); if(!prev || took<prev) localStorage.setItem(this.bestKey, String(took)); this.container.querySelector('#bestP'+this.idx).textContent = formatTimeSec(this.getBest()); }
  endFail(){ this.ended=true; this.grid.querySelectorAll('.cell').forEach(c=>c.classList.add('disabled')); }
  getBest(){ const v=localStorage.getItem(this.bestKey); return v?Number(v):null; }
}

/* ---------- Orchestration & Layout ---------- */
const levelSel = document.getElementById('level');
const customNlabel = document.getElementById('customNlabel');
const customN = document.getElementById('customN');
const playersInput = document.getElementById('players');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const targetFontInput = document.getElementById('targetFont');
const countdownInput = document.getElementById('countdown');
const gridsWrap = document.getElementById('gridsWrap');

levelSel.addEventListener('change', ()=> { customNlabel.style.display = levelSel.value==='custom' ? 'inline-block' : 'none'; });
startBtn.addEventListener('click', ()=> startGame());
resetBtn.addEventListener('click', ()=> resetAll());
window.addEventListener('resize', ()=> { if(currentGames.length) relayout(currentGamesSettings); });

let currentGames = [];
let currentGamesSettings = null;

function startGame(){
  const level = levelSel.value;
  let n = (level==='easy')?5:(level==='medium')?7:(level==='hard')?10:Math.max(10, Math.floor(Number(customN.value)||12));
  const players = Math.min(4, Math.max(1, Math.floor(Number(playersInput.value)||1)));
  const countdown = Math.max(10, Math.floor(Number(countdownInput.value)||600));
  const targetFont = Math.max(18, Number(targetFontInput.value)||65);

  const cellSize = computeOptimalCellSize(n, players);
  currentGamesSettings = {n, players, cellSize, countdown, targetFont};
  buildPlayers(currentGamesSettings);

  gridsWrap.style.overflowY = 'hidden';
  gridsWrap.style.overflowX = 'auto';
}

function buildPlayers(cfg){
  gridsWrap.innerHTML = '';
  currentGames = [];
  for(let i=0;i<cfg.players;i++){
    const area = document.createElement('div'); area.className='player-area';
    // flex-basis to help layout; allow wrapping if needed
    const flexBasis = Math.max(220, Math.round((window.innerWidth - (cfg.players-1)*16 - 24)/cfg.players));
    area.style.flex = `1 1 ${flexBasis}px`;
    gridsWrap.appendChild(area);
    const pg = new PlayerGame(i, cfg.n, cfg.cellSize, cfg.countdown, area, cfg.targetFont);
    currentGames.push(pg);
  }
  document.documentElement.style.setProperty('--cell-size', cfg.cellSize + 'px');
  document.documentElement.style.setProperty('--cell-font', Math.max(10, Math.round(cfg.cellSize*0.42)) + 'px');
  document.documentElement.style.setProperty('--target-font', cfg.targetFont + 'px');
}

function relayout(cfg){
  if(!cfg) return;
  const newCell = computeOptimalCellSize(cfg.n, cfg.players);
  if(newCell === cfg.cellSize) return;
  currentGamesSettings.cellSize = newCell;
  buildPlayers(currentGamesSettings);
}

function resetAll(){
  currentGames = [];
  currentGamesSettings = null;
  gridsWrap.innerHTML = '';
}

/* Auto-start with defaults */
startGame();
</script>
</body>
</html>
