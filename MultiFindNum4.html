<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grid Generator Game - Per-player Target</title>
<style>
  :root{
    --cell-size:60px;
    --cell-font:25px;
    --target-font:65px;
    --gap:6px;
  }
  body{font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; margin:12px; background:#f6f7f9;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .top-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .grids-wrap{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;}
  .player-area{background:#fff;padding:10px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);min-width:260px;}
  .player-title{font-weight:700;margin-bottom:8px;font-size:14px}
  .player-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
  .target-box{display:flex;align-items:center;justify-content:center;width:120px;height:64px;background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);flex-direction:column}
  .target-number{font-weight:700;font-size:var(--target-font);line-height:1}
  .target-label{font-size:12px;color:#666}
  .grid{display:grid;gap:var(--gap);touch-action:manipulation;user-select:none}
  .cell{width:var(--cell-size);height:var(--cell-size);display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#fff;font-weight:700;font-size:var(--cell-font)}
  .cell.disabled{opacity:0.45;pointer-events:none}
  .metrics{margin-top:8px;font-size:13px;color:#333}
  @media (max-width:900px){:root{--cell-size:48px;--cell-font:20px;--target-font:48px}}
  @media (max-width:420px){:root{--cell-size:40px;--cell-font:18px;--target-font:40px;--gap:4px}.target-box{width:100px;height:56px}}
</style>
</head>
<body>

<div class="top-row">
  <div class="controls">
    <label>Level:
      <select id="level">
        <option value="easy">Dễ 5×5 (1-25)</option>
        <option value="medium">Trung bình 7×7 (1-49)</option>
        <option value="hard">Khó 10×10 (1-100)</option>
        <option value="custom">Siêu khó (nxn)</option>
      </select>
    </label>

    <label id="customNlabel" style="display:none">n:
      <input id="customN" type="number" min="10" value="12" style="width:72px" />
    </label>

    <label>Cell size (px):
      <input id="cellSize" type="number" min="24" value="60" style="width:80px" />
    </label>

    <label>Cell font (px):
      <input id="cellFont" type="number" min="10" value="25" style="width:80px" />
    </label>

    <label>Target font (px):
      <input id="targetFont" type="number" min="18" value="65" style="width:80px" />
    </label>

    <label>Time (s):
      <input id="countdown" type="number" min="10" value="600" style="width:90px" />
    </label>

    <label>Players:
      <input id="players" type="number" min="1" max="4" value="1" style="width:64px" />
    </label>

    <button id="startBtn">Start</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>

<div class="grids-wrap" id="gridsWrap">
  <!-- player grids appended here -->
</div>

<script>
/* --- Helpers (same as before) --- */
function formatTimeSec(s){ if(s<0)s=0; const mm = Math.floor(s/60).toString().padStart(2,'0'); const ss = Math.floor(s%60).toString().padStart(2,'0'); return `${mm}:${ss}`; }
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function randomColor(){ const h=Math.floor(Math.random()*360); const s=60+Math.floor(Math.random()*30); const l=45+Math.floor(Math.random()*10); return `hsl(${h} ${s}% ${l}%)`; }
function getContrastTextColor(rgbOrHsl){ const tmp=document.createElement('div'); tmp.style.color=rgbOrHsl; document.body.appendChild(tmp); const cs=getComputedStyle(tmp).color; document.body.removeChild(tmp); const parts=cs.match(/\d+/g); if(!parts) return '#000'; const r=+parts[0], g=+parts[1], b=+parts[2]; const brightness=(r*299+g*587+b*114)/1000; return brightness>150? '#000':'#fff'; }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

/* --- PlayerGame class with per-player target display --- */
class PlayerGame {
  constructor(playerIndex, settings, container){
    this.playerIndex = playerIndex;
    this.settings = settings;
    this.container = container;
    this.gridEl = null;
    this.cells = [];
    this.currentTarget = 1;
    this.started = false;
    this.ended = false;
    this.remaining = settings.countdown;
    this.startTimestamp = null;
    this.finishSeconds = null;
    this.bestKey = `best_time_player_${playerIndex}_${settings.max}`;
    this.init();
  }

  init(){
    this.container.innerHTML = '';
    const title = document.createElement('div');
    title.className = 'player-title';
    title.textContent = `Player ${this.playerIndex+1}`;
    this.container.appendChild(title);

    // header with per-player target and timer
    const header = document.createElement('div');
    header.className = 'player-header';
    const targetBox = document.createElement('div');
    targetBox.className = 'target-box';
    targetBox.innerHTML = `<div class="target-label">Cần tìm</div><div class="target-number" id="targetP${this.playerIndex}">1</div>`;
    header.appendChild(targetBox);

    const timerBox = document.createElement('div');
    timerBox.style.textAlign='right';
    timerBox.innerHTML = `<div style="font-size:12px;color:#666">Còn</div><div id="timerP${this.playerIndex}" style="font-weight:700">${formatTimeSec(this.settings.countdown)}</div><div style="font-size:12px;color:#666">Best: <span id="bestP${this.playerIndex}">—</span></div>`;
    header.appendChild(timerBox);

    this.container.appendChild(header);

    const gridEl = document.createElement('div');
    gridEl.className = 'grid';
    this.gridEl = gridEl;
    this.container.appendChild(gridEl);

    const meta = document.createElement('div');
    meta.className = 'metrics';
    meta.innerHTML = `Đã tìm: <span class="foundCount">0</span> / ${this.settings.max}`;
    this.container.appendChild(meta);
    this.foundEl = meta.querySelector('.foundCount');

    this.setupGrid();
    this.applySizing();
    this.updateTargetDisplay();
    this.updateTimerDisplay();
    const best = this.getBestTime(); if(best) this.container.querySelector('#bestP'+this.playerIndex).textContent = formatTimeSec(best);
  }

  setupGrid(){
    const n = this.settings.n;
    this.gridEl.style.gridTemplateColumns = `repeat(${n}, ${this.settings.cellSize}px)`;
    this.gridEl.style.gridTemplateRows = `repeat(${n}, ${this.settings.cellSize}px)`;
    this.gridEl.innerHTML = '';
    this.cells = [];
    let arr = [];
    for(let i=1;i<=n*n;i++) arr.push(i);
    arr = shuffle(arr);
    for(let i=0;i<n*n;i++){
      const val = arr[i];
      const cell = document.createElement('button');
      cell.className='cell';
      cell.setAttribute('data-value', val);
      cell.textContent = val;
      const bg = randomColor();
      cell.style.background = bg;
      cell.style.color = getContrastTextColor(bg);
      cell.style.fontSize = `${this.settings.cellFont}px`;
      cell.addEventListener('click', ()=> this.onCellClick(cell, val));
      this.gridEl.appendChild(cell);
      this.cells.push(cell);
    }
  }

  applySizing(){
    this.gridEl.querySelectorAll('.cell').forEach(c=>{
      c.style.width = this.settings.cellSize + 'px';
      c.style.height = this.settings.cellSize + 'px';
      c.style.fontSize = this.settings.cellFont + 'px';
      c.style.borderRadius = Math.max(4, Math.round(this.settings.cellSize*0.08)) + 'px';
    });
  }

  startTimer(globalUpdateCallback){
    if(this.started) return;
    this.started = true;
    this.startTimestamp = Date.now();
    this.remaining = this.settings.countdown;
    this.updateInterval = setInterval(()=>{
      this.remaining = this.settings.countdown - Math.floor((Date.now()-this.startTimestamp)/1000);
      if(this.remaining <= 0){
        this.remaining = 0;
        clearInterval(this.updateInterval);
        this.end(false);
      }
      this.updateTimerDisplay();
      globalUpdateCallback();
    }, 300);
  }

  onCellClick(cell, val){
    if(this.ended) return;
    if(!this.started){
      this.startTimer(()=>updateGlobalUI());
    }
    if(val === this.currentTarget){
      cell.classList.add('disabled');
      this.currentTarget++;
      this.foundEl.textContent = (this.currentTarget-1);
      this.updateTargetDisplay();
      if(this.currentTarget > this.settings.max){
        this.end(true);
      }
    } else {
      cell.animate([{transform:'scale(1)'},{transform:'scale(0.95)'},{transform:'scale(1)'}],{duration:150});
    }
  }

  updateTargetDisplay(){
    const el = this.container.querySelector('#targetP'+this.playerIndex);
    el.textContent = this.currentTarget <= this.settings.max ? this.currentTarget : '—';
  }

  updateTimerDisplay(){
    const el = this.container.querySelector('#timerP'+this.playerIndex);
    el.textContent = formatTimeSec(this.started ? this.remaining : this.settings.countdown);
  }

  end(success){
    this.ended = true;
    clearInterval(this.updateInterval);
    if(success){
      const took = Math.floor((Date.now()-this.startTimestamp)/1000);
      this.finishSeconds = took;
      const prev = sessionStorage.getItem(this.bestKey);
      if(!prev || took < Number(prev)) sessionStorage.setItem(this.bestKey, String(took));
      this.container.querySelector('#bestP'+this.playerIndex).textContent = formatTimeSec(this.getBestTime());
    } else {
      this.cells.forEach(c=>c.classList.add('disabled'));
    }
  }

  getBestTime(){ const v = sessionStorage.getItem(this.bestKey); return v?Number(v):null; }
}

/* --- Orchestration (adjusted for per-player displays) --- */
const gridsWrap = document.getElementById('gridsWrap');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const levelSel = document.getElementById('level');
const customNlabel = document.getElementById('customNlabel');
const customN = document.getElementById('customN');
const cellSizeInput = document.getElementById('cellSize');
const cellFontInput = document.getElementById('cellFont');
const targetFontInput = document.getElementById('targetFont');
const countdownInput = document.getElementById('countdown');
const playersInput = document.getElementById('players');

levelSel.addEventListener('change', ()=>{ if(levelSel.value==='custom') customNlabel.style.display='inline-block'; else customNlabel.style.display='none'; });
startBtn.addEventListener('click', ()=> startGame());
resetBtn.addEventListener('click', ()=> resetAll());

let playersGames = [];
let settingsGlobal = null;

function buildPlayerAreas(count){
  gridsWrap.innerHTML='';
  const arr=[];
  for(let i=0;i<count;i++){
    const wrapper=document.createElement('div');
    wrapper.className='player-area';
    wrapper.style.flex='1 1 300px';
    gridsWrap.appendChild(wrapper);
    arr.push(wrapper);
  }
  return arr;
}

function startGame(){
  const level = levelSel.value;
  let n;
  if(level==='custom') n = Math.max(10, Math.floor(Number(customN.value)||10));
  else if(level==='easy') n=5;
  else if(level==='medium') n=7;
  else n=10;
  const cellSize = Math.max(24, Number(cellSizeInput.value)||60);
  const cellFont = Math.max(10, Number(cellFontInput.value)||25);
  const targetFont = Math.max(18, Number(targetFontInput.value)||65);
  const countdown = Math.max(10, Math.floor(Number(countdownInput.value)||600));
  const playerCount = Math.min(4, Math.max(1, Math.floor(Number(playersInput.value)||1)));
  settingsGlobal = {n, max: n*n, cellSize, cellFont, targetFont, countdown, playerCount};
  document.documentElement.style.setProperty('--cell-size', cellSize+'px');
  document.documentElement.style.setProperty('--cell-font', cellFont+'px');
  document.documentElement.style.setProperty('--target-font', targetFont+'px');

  const areas = buildPlayerAreas(playerCount);
  playersGames = [];
  for(let i=0;i<playerCount;i++){
    const pSettings = {n, max: n*n, cellSize, cellFont, targetFont, countdown};
    const pg = new PlayerGame(i, pSettings, areas[i]);
    playersGames.push(pg);
  }
}

function resetAll(){ playersGames.forEach(pg=>pg.end(false)); playersGames=[]; gridsWrap.innerHTML=''; }

function updateGlobalUI(){ /* noop when per-player displays handle their own timers */ }

/* auto-start */
startGame();
</script>
</body>
</html>
